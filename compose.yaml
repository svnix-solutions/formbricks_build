# Formbricks self-hosted stack (v5 baseline) for Komodo.
#
# Baseline services: postgres, redis, formbricks (+ migrate), hub (+ migrate), cube.
# Ingress is handled OUT of this stack by a separate Cloudflare Tunnel (cloudflared)
# stack. This compose exposes Formbricks (container name "formbricks", port 3000)
# on an EXTERNAL proxy network — name via ${PROXY_NETWORK:-cloudflared} — that the
# cloudflared stack also joins, and as a fallback on 127.0.0.1:3000.
# Create the network once before first deploy:
#   docker network create ${PROXY_NETWORK:-cloudflared}
#
# Config/secrets are NOT committed. In Komodo, put them in the Stack's
# "Environment" field: Komodo writes them to `.env` (env_file_path) in the run
# directory and runs `docker compose up --env-file .env`. That drives the ${VAR}
# interpolation below; the app service also loads `.env` via env_file so optional
# vars (SMTP, OAuth, S3, integrations, ...) reach the container without editing
# this file. See .env.example for the full list to paste into that field.

x-environment: &environment
  environment: &app-environment
    ############################### REQUIRED ###############################
    # Public-facing URL of your instance (the Cloudflare hostname), e.g. https://forms.example.com
    WEBAPP_URL: ${WEBAPP_URL}
    # next-auth base URL. Must match WEBAPP_URL.
    NEXTAUTH_URL: ${NEXTAUTH_URL}
    # Postgres connection string (points at the bundled postgres service below).
    DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/formbricks?schema=public"
    # next-auth secret. Generate: openssl rand -hex 32
    NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    # Encryption key for 2FA & single-use link-survey URLs. Generate: openssl rand -hex 32
    ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    # Secret protecting cron endpoints. Generate: openssl rand -hex 32
    CRON_SECRET: ${CRON_SECRET}
    # Redis/Valkey URL for caching, rate limiting, and audit logging.
    REDIS_URL: redis://redis:6379
    # Formbricks Hub API key. Generate: openssl rand -hex 32
    HUB_API_KEY: ${HUB_API_KEY:-}
    HUB_API_URL: ${HUB_API_URL:-http://hub:8080}
    # Cube semantic-layer API (analytics). CUBEJS_API_SECRET is required. Generate: openssl rand -hex 32
    CUBEJS_API_URL: ${CUBEJS_API_URL:-http://cube:4000}
    CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-}
    CUBEJS_JWT_ISSUER: ${CUBEJS_JWT_ISSUER:-formbricks-web}
    CUBEJS_JWT_AUDIENCE: ${CUBEJS_JWT_AUDIENCE:-formbricks-cube}

    # Taxonomy credentials are consumed by Hub only. Kept empty here so a shared
    # .env cannot leak them into the web app. (Taxonomy/AI services are omitted
    # from this baseline stack; see README to enable them later.)
    TAXONOMY_SERVICE_URL: ""
    TAXONOMY_SERVICE_TOKEN: ""
    HUB_INTERNAL_API_TOKEN: ""

    ############################### APP TOGGLES ###############################
    # Set to 0 to require email verification for new signups (needs SMTP configured in .env).
    EMAIL_VERIFICATION_DISABLED: ${EMAIL_VERIFICATION_DISABLED:-1}
    # Set to 0 to enable password reset (needs SMTP configured in .env).
    PASSWORD_RESET_DISABLED: ${PASSWORD_RESET_DISABLED:-1}

services:
  postgres:
    restart: always
    image: pgvector/pgvector:pg18
    volumes:
      - postgres:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=formbricks
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  redis:
    restart: always
    image: valkey/valkey@sha256:12ba4f45a7c3e1d0f076acd616cb230834e75a77e8516dde382720af32832d6d
    command: valkey-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # Runs Formbricks Prisma migrations before Hub writes tables to the shared DB.
  formbricks-migrate:
    image: svnix/formbricks${FB_IMAGE_REF:-:latest}
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      [
        'if command -v timeout >/dev/null 2>&1; then timeout 300 node packages/database/dist/scripts/apply-migrations.js; else node packages/database/dist/scripts/apply-migrations.js; fi',
      ]
    depends_on:
      postgres:
        condition: service_healthy
    <<: *environment

  formbricks:
    restart: always
    image: svnix/formbricks${FB_IMAGE_REF:-:latest}
    container_name: formbricks
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cube:
        condition: service_healthy
    # Reachable by the separate cloudflared stack via the external proxy network
    # (http://formbricks:3000). Host publish is bound to localhost only, as a fallback.
    ports:
      - "127.0.0.1:3000:3000"
    # Only the web app is attached to the external proxy network; the datastores
    # and internal APIs stay on the private "default" network.
    networks:
      - default
      - proxy
    volumes:
      - ./saml-connection:/home/nextjs/apps/web/saml-connection
    environment:
      <<: *app-environment
      SKIP_STARTUP_MIGRATION: "true"

  # Runs Hub DB migrations (goose + river) before the Hub API starts. Idempotent.
  hub-migrate:
    image: svnix/formbricks-hub${HUB_IMAGE_REF:-:latest}
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      [
        'if [ -x /usr/local/bin/goose ] && [ -x /usr/local/bin/river ]; then /usr/local/bin/goose -dir /app/migrations postgres "$$DATABASE_URL" up && /usr/local/bin/river migrate-up --database-url "$$DATABASE_URL"; else echo ''Migration tools (goose/river) not in image.''; exit 1; fi',
      ]
    environment:
      DATABASE_URL: ${HUB_DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/formbricks?sslmode=disable}
    depends_on:
      formbricks-migrate:
        condition: service_completed_successfully

  # Formbricks Hub API. Shares the Formbricks database by default.
  hub:
    restart: always
    image: svnix/formbricks-hub${HUB_IMAGE_REF:-:latest}
    depends_on:
      hub-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      API_KEY: ${HUB_API_KEY:-}
      DATABASE_URL: ${HUB_DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/formbricks?sslmode=disable}
      TAXONOMY_SERVICE_URL: ${TAXONOMY_SERVICE_URL:-}
      TAXONOMY_SERVICE_TOKEN: ${TAXONOMY_SERVICE_TOKEN:-}
      HUB_INTERNAL_API_TOKEN: ${HUB_INTERNAL_API_TOKEN:-}

  # Cube semantic-layer API used by Formbricks analytics dashboards.
  cube:
    restart: always
    image: cubejs/cube:v1.6.6
    command:
      - sh
      - -c
      - |
        if [ -z "$$CUBEJS_API_SECRET" ]; then
          echo "CUBEJS_API_SECRET is required for Cube JWT authentication" >&2
          exit 1
        fi
        exec cubejs server
    depends_on:
      hub-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: ${CUBEJS_DB_HOST:-postgres}
      CUBEJS_DB_NAME: ${CUBEJS_DB_NAME:-formbricks}
      CUBEJS_DB_USER: ${CUBEJS_DB_USER:-postgres}
      CUBEJS_DB_PASS: ${CUBEJS_DB_PASS:-${POSTGRES_PASSWORD:-postgres}}
      CUBEJS_DB_PORT: ${CUBEJS_DB_PORT:-5432}
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-}
      CUBEJS_JWT_ISSUER: ${CUBEJS_JWT_ISSUER:-formbricks-web}
      CUBEJS_JWT_AUDIENCE: ${CUBEJS_JWT_AUDIENCE:-formbricks-cube}
      CUBEJS_DEFAULT_API_SCOPES: meta,data
      CUBEJS_CACHE_AND_QUEUE_DRIVER: memory
    volumes:
      - ./cube/cube.js:/cube/conf/cube.js:ro
      - ./cube/schema:/cube/conf/model:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/readyz', (res) => { res.resume(); process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres:
    driver: local
  redis:
    driver: local

networks:
  # Private network for datastores + internal APIs (postgres, redis, hub, cube).
  # Name is customizable but this network is created/owned by this stack.
  default:
    name: ${INTERNAL_NETWORK:-formbricks_internal}
  # External proxy network shared with the separate cloudflared stack.
  # Create it once before deploying:  docker network create ${PROXY_NETWORK:-cloudflared}
  # Then attach cloudflared to the same network and route the tunnel to
  # http://formbricks:3000
  proxy:
    name: ${PROXY_NETWORK:-cloudflared}
    external: true
